version: "3.8"

services:
  # ── MySQL 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: ai_test_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChangeMe123!}
      MYSQL_DATABASE: ai_test_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 缓存 & 消息队列 ──
  redis:
    image: redis:7-alpine
    container_name: ai_test_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI 后端 ──
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_test_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-ChangeMe123!}
      - MYSQL_DATABASE=ai_test_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_GOOGLE_API_KEY=${LLM_GOOGLE_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ZENTAO_BASE_URL=${ZENTAO_BASE_URL:-http://zentao.example.com}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_test_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-ChangeMe123!}
      - MYSQL_DATABASE=ai_test_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_ANTHROPIC_API_KEY=${LLM_ANTHROPIC_API_KEY:-}
      - LLM_GOOGLE_API_KEY=${LLM_GOOGLE_API_KEY:-}
      - ZENTAO_BASE_URL=${ZENTAO_BASE_URL:-http://zentao.example.com}
    volumes:
      - uploads_data:/app/uploads

  # ── 前端 Nginx ──
  frontend:
    image: nginx:alpine
    container_name: ai_test_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  uploads_data:
